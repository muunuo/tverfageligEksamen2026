<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make account</title>
    <!-- <script src="show.js" defer></script>
    <script src="showapi.js" defer></script>
    <link rel="stylesheet" href="login.css"> -->
</head>
<body>

    <form id="logIn" method="POST" action="/createUser_">
        <h3>Create Account</h3>
        <label for="username_">Username</label>
        <input placeholder="user" required type="text" name="username_" id="username_">
        <label for="password_">Password</label>
        <input placeholder="Password01" required type="password" name="password_" id="password_">
        <label for="firstname_">Firstname</label>
        <input placeholder="Firstname" required type="text" name="firstname_" id="firstname_">
        <label for="lastname_">Lastname</label>
        <input placeholder="Lastname" required type="text" name="lastname_" id="lastname_">
        <select name="role_" id="role_">
            <option value="1">Admin</option>
            <option value="2">General</option>
            <option value="3">Support</option>
        </select>
        <button type="submit">Create Account</button>
    </form>

    <form method="POST" action="/login_" id="logInForm">
        <h3>Log In</h3>
        <label for="inUsername_">Username</label>
        <input placeholder="user" required type="text" name="inUsername_" id="inUsername_">
        <label for="inPassword_">Password</label>
        <input placeholder="Password01" required type="password" name="inPassword_" id="inPassword_">
        <button type="submit">log in</button>
    </form>
</body>
</html>
