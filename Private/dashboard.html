<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="private.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Helpdesk</h1>

    <form method="POST" action="/helpTicket_">
        <label for="title_">Title</label>
        <input placeholder="Title" required type="text" name="title_" id="title_">
        <label for="info_">Describe the problem</label>
        <input placeholder="Describe the problem you need help with!" required type="text" name="info_" id="info_">
        <label for="info_">How big of a priority is this?</label>
        <select name="deadline_" id="deadline_">
            <option value="important">High</option>
            <option value="normal">Normal</option>
            <option value="low">Low</option>
        </select>
        <button type="submit">send ticket</button>
    </form>



    <h1>Secrets!</h1>
    <main>
        <section id="userInfo_">
            <h2>Min side</h2>
            <div id="userData_">
                <!-- Brukerdata vil bli lastet her -->
            </div>
        </section>

        <!-- Vises kun for support-brukere -->
        <section id="supportSection_" style="display:none;">
            <h2>Support – all user names</h2>
            <div id="supportData_">
                <!-- Støttedata vil bli lastet her -->
            </div>
        </section>

        <!-- Vises kun for admin-brukere -->
         
        <section id="adminSection_" style="display:none;">
            <h2>Admin – fullstendig brukeroversikt</h2>
            <div id="adminData_">
                <!-- Admin-data vil bli lastet her -->
            </div>
        </section>

        <section id="ticketSection_" style="display:none;">
            <h2>Support – all user names</h2>
            <div id="ticketData_">
                <!-- Støttedata vil bli lastet her -->
            </div>
        </section>
    </main>

    <button id="logoutButton">Log out</button>
</body>
</html>
