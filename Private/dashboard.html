<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="private.js" defer></script>
    <link rel="stylesheet" href="style.css">

<body>

        <!-- User can see their own info -->

            <h2>Min side</h2>

        </section>
    <!-- User can register help ticket -->
    <h1>Helpdesk</h1>
    <form method="POST" action="/helpTicket_">
        <label for="title_">Title</label>
        <input placeholder="Title" required type="text" name="title_" id="title_">
        <label for="info_">Describe the problem</label>
        <input placeholder="Describe the problem you need help with!" required type="text" name="info_" id="info_">
        <label for="info_">How big of a priority is this?</label>
        <select name="deadline_" id="deadline_">
            <option value="important">High</option>
            <option value="normal">Normal</option>
            <option value="low">Low</option>
        </select>
        <br>
        <button type="submit">send ticket</button>
        <!-- all info is sent to database -->
    </form>
<br><br>

<h1>Ask for Offer</h1>
<p>Want a offer on a possible joB? Just send the job and we will give you an offer you cant refuse!</p>
    <form method="POST" action="/klientTask_">
        <label for="title_">Title</label>
        <input placeholder="Title" required type="text" name="title_" id="title_">
        <label for="info_">Describe the problem</label>
        <input placeholder="Describe the problem you need help with!" required type="text" name="info_" id="info_">
        <label for="info_">How big of a priority is this?</label>
        <select name="department_" id="department_">
            <option value="3">IT Support</option>
            <option value="4">Development</option>
            <option value="5">IT Operations</option>
        </select>
        <br>
        <button type="submit">send ticket</button>
        <!-- all info is sent to database -->
    </form>
<br><br>
    <main>

<br><br>

            </div>

<br><br>
        <section id="ticketSection_" style="display:none;">
            <h2>Tickets - All helpdesk tickets</h2>

                <!-- ticket-data is shown here  -->
